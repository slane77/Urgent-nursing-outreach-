<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Register your interest — Day Webster</title>
<style>
  :root { --green:#16a34a; --green-light:#f0fdf4; --grey-200:#e5e7eb; --grey-500:#6b7280; --grey-700:#374151; --grey-900:#111827; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:0; background:var(--green-light); color:var(--grey-700); }
  .wrap { max-width:560px; margin:32px auto; padding:0 16px; }
  .brand { text-align:center; margin-bottom:16px; }
  .brand img { height:46px; }
  .card { background:#fff; border:1px solid var(--grey-200); border-radius:12px; padding:28px; }
  h1 { font-size:22px; margin:0 0 6px; color:var(--grey-900); }
  p.lead { margin:0 0 20px; color:var(--grey-500); font-size:14px; }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 5px; }
  input, select, textarea { width:100%; padding:10px 12px; border:1px solid var(--grey-200); border-radius:8px; font-size:14px; font-family:inherit; background:#fff; }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  .consent { display:flex; gap:10px; align-items:flex-start; margin:18px 0; font-size:13px; }
  .consent input { width:auto; margin-top:2px; }
  button { width:100%; background:var(--green); color:#fff; border:none; border-radius:8px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
  button:disabled { opacity:.5; }
  .hp { position:absolute; left:-9999px; }
  .msg { margin-top:14px; font-size:14px; }
  .ok { color:var(--green); font-weight:600; }
  .err { color:#dc2626; }
  .privacy { margin-top:16px; font-size:12px; color:var(--grey-500); text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><img src="dw-logo.jpg" alt="Day Webster" /></div>
  <div class="card">
    <h1>Register your interest</h1>
    <p class="lead">Tell us a little about yourself and the right consultant will be in touch about suitable work. Takes under a minute.</p>
    <form id="form">
      <div class="row">
        <div><label>First name</label><input name="first_name" required /></div>
        <div><label>Last name</label><input name="last_name" required /></div>
      </div>
      <label>Email</label><input type="email" name="email" required />
      <label>Mobile number</label><input name="phone" inputmode="tel" />
      <div class="row">
        <div><label>Profession</label>
          <select name="discipline_code" id="disc" required>
            <option value="">Select…</option>
          </select>
        </div>
        <div><label>Speciality / role</label>
          <select name="specialty_code" id="spec"><option value="">Select…</option></select>
        </div>
      </div>
      <label>Which area are you mainly looking for work?</label>
      <select name="region">
        <option value="">Prefer not to say</option>
        <option value="North">North of England</option>
        <option value="South">South of England</option>
        <option value="Other">Elsewhere / nationwide</option>
      </select>
      <div class="row">
        <div><label>Town</label><input name="town" /></div>
        <div><label>Postcode</label><input name="postcode" /></div>
      </div>
      <label>Availability (optional)</label><input name="availability" placeholder="e.g. immediate, days/nights, from June" />
      <label>Anything else? (optional)</label><textarea name="message" rows="3"></textarea>
      <input class="hp" name="website" tabindex="-1" autocomplete="off" />
      <input type="hidden" name="vacancy" /><input type="hidden" name="campaign" />
      <div class="consent">
        <input type="checkbox" id="consent" required />
        <label for="consent" style="font-weight:400; margin:0;">I consent to Day Webster storing my details and contacting me about work opportunities. I can withdraw consent at any time.</label>
      </div>
      <button type="submit" id="submit">Register</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
  <p class="privacy">Your details are held securely and used only to discuss work with Day Webster.</p>
</div>
<script src="js/config.js"></script>
<script>
const FN = window.CONFIG.SUPABASE_URL + '/functions/v1/candidate-intake';

// Discipline → specialties taxonomy (mirrors the database seed) so registrants
// self-route to the right desk without needing a logged-in API call.
const TAXONOMY = {
  nursing:      { name:'Nursing', specs:[['general','General Nursing'],['ward','Ward Nursing'],['ae','A&E Nursing'],['itu','ITU/ICU Nursing'],['theatres','Theatres'],['theatres_odp','Theatres (ODP)'],['midwifery','Midwifery'],['neonatal','Neonatal'],['paediatrics','Paediatrics'],['rmn','RMN (Mental Health)'],['hca','Healthcare Assistant'],['primary_care','Primary Care'],['anp','Advanced Nurse Practitioner'],['enp','Emergency Nurse Practitioner']] },
  doctors:      { name:'Doctor', specs:[['general','General / Locum'],['gp','GP'],['specialty','Specialty Doctor'],['consultant','Consultant']] },
  complex_care: { name:'Complex Care', specs:[['general','Complex Care']] },
  ahp:          { name:'Allied Health (AHP)', specs:[['physio','Physiotherapy'],['ot','Occupational Therapy'],['slt','Speech & Language Therapy'],['dietetics','Dietetics'],['radiography','Radiography'],['paramedic','Paramedic'],['odp','Operating Department Practitioner'],['podiatry','Podiatry']] },
  childrens:    { name:"Children's Services", specs:[['carer',"Children's Home Carer"],['senior','Senior Residential Worker'],['registered_mgr','Registered Manager']] },
  care_homes:   { name:'Care Home', specs:[['care_assistant','Care Assistant'],['senior_carer','Senior Carer'],['nurse','Nurse (Care Home)'],['registered_mgr','Registered Manager']] },
  insurance:    { name:'Insurance', specs:[['underwriter','Underwriter'],['broker','Broker'],['claims','Claims']] },
};
const disc = document.getElementById('disc'), spec = document.getElementById('spec');
for (const [code, d] of Object.entries(TAXONOMY)) disc.add(new Option(d.name, code));
disc.addEventListener('change', () => {
  spec.innerHTML = '<option value="">Select…</option>';
  (TAXONOMY[disc.value]?.specs || []).forEach(([c, n]) => spec.add(new Option(n, c)));
});

// Attribution: ?vacancy=<slug>&campaign=<id> (set on adverts / landing links)
const qp = new URLSearchParams(location.search);
if (qp.get('vacancy')) document.querySelector('[name=vacancy]').value = qp.get('vacancy');
if (qp.get('campaign')) document.querySelector('[name=campaign]').value = qp.get('campaign');

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = e.target, msg = document.getElementById('msg'), btn = document.getElementById('submit');
  const data = Object.fromEntries(new FormData(f).entries());
  data.consent = document.getElementById('consent').checked;
  btn.disabled = true; msg.textContent = 'Submitting…'; msg.className = 'msg';
  try {
    const res = await fetch(FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': window.CONFIG.SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + window.CONFIG.SUPABASE_ANON_KEY },
      body: JSON.stringify(data),
    });
    const out = await res.json();
    if (out.ok) { f.reset(); spec.innerHTML = '<option value="">Select…</option>'; msg.className = 'msg ok'; msg.textContent = 'Thank you — you are registered. The right consultant will be in touch.'; }
    else { msg.className = 'msg err'; msg.textContent = out.error || 'Something went wrong. Please try again.'; btn.disabled = false; }
  } catch (err) { msg.className = 'msg err'; msg.textContent = 'Network error. Please try again.'; btn.disabled = false; }
});
</script>
</body>
</html>
