<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Register your interest — Day Webster</title>
<style>
  :root { --green:#16a34a; --green-light:#f0fdf4; --grey-200:#e5e7eb; --grey-500:#6b7280; --grey-700:#374151; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:0; background:var(--green-light); color:var(--grey-700); }
  .wrap { max-width:560px; margin:40px auto; padding:0 16px; }
  .card { background:#fff; border:1px solid var(--grey-200); border-radius:12px; padding:28px; }
  h1 { font-size:22px; margin:0 0 6px; }
  p.lead { margin:0 0 20px; color:var(--grey-500); font-size:14px; }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 5px; }
  input, select, textarea { width:100%; padding:10px 12px; border:1px solid var(--grey-200); border-radius:8px; font-size:14px; font-family:inherit; }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  .consent { display:flex; gap:10px; align-items:flex-start; margin:18px 0; font-size:13px; }
  .consent input { width:auto; margin-top:2px; }
  button { width:100%; background:var(--green); color:#fff; border:none; border-radius:8px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
  button:disabled { opacity:.5; }
  .hp { position:absolute; left:-9999px; }
  .msg { margin-top:14px; font-size:14px; }
  .ok { color:var(--green); font-weight:600; }
  .err { color:#dc2626; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Register your interest</h1>
    <p class="lead">Tell us a little about yourself and a member of our team (or our assistant) will be in touch about suitable work.</p>
    <form id="form">
      <div class="row">
        <div><label>First name</label><input name="first_name" required /></div>
        <div><label>Last name</label><input name="last_name" required /></div>
      </div>
      <label>Email</label><input type="email" name="email" required />
      <label>Phone</label><input name="phone" />
      <div class="row">
        <div><label>Profession / role</label>
          <input name="discipline" list="disc" placeholder="e.g. Nurse, Doctor, Physio, Carer" />
          <datalist id="disc"><option>Nursing</option><option>Doctor</option><option>Complex Care</option><option>AHP</option><option>Children's Services</option><option>Care Home</option><option>Insurance</option></datalist>
        </div>
        <div><label>Speciality (optional)</label><input name="specialty" placeholder="e.g. Theatres, Midwifery" /></div>
      </div>
      <div class="row">
        <div><label>Town</label><input name="town" /></div>
        <div><label>Postcode</label><input name="postcode" /></div>
      </div>
      <label>Availability (optional)</label><input name="availability" placeholder="e.g. immediate, days/nights, from June" />
      <label>Anything else?</label><textarea name="message" rows="3"></textarea>
      <input class="hp" name="website" tabindex="-1" autocomplete="off" />
      <div class="consent">
        <input type="checkbox" id="consent" required />
        <label for="consent" style="font-weight:400; margin:0;">I consent to Day Webster storing my details and contacting me about work opportunities. I can withdraw consent at any time.</label>
      </div>
      <button type="submit" id="submit">Register</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
</div>
<script src="js/config.js"></script>
<script>
const FN = window.CONFIG.SUPABASE_URL + '/functions/v1/candidate-intake';
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = e.target, msg = document.getElementById('msg'), btn = document.getElementById('submit');
  const data = Object.fromEntries(new FormData(f).entries());
  data.consent = document.getElementById('consent').checked;
  btn.disabled = true; msg.textContent = 'Submitting…'; msg.className = 'msg';
  try {
    const res = await fetch(FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': window.CONFIG.SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + window.CONFIG.SUPABASE_ANON_KEY },
      body: JSON.stringify(data),
    });
    const out = await res.json();
    if (out.ok) { f.reset(); msg.className = 'msg ok'; msg.textContent = 'Thank you — you are registered. We will be in touch.'; }
    else { msg.className = 'msg err'; msg.textContent = out.error || 'Something went wrong. Please try again.'; btn.disabled = false; }
  } catch (err) { msg.className = 'msg err'; msg.textContent = 'Network error. Please try again.'; btn.disabled = false; }
});
</script>
</body>
</html>
