<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Your documents — Day Webster</title>
<link rel="stylesheet" href="dw-theme.css" />
<style>
  .wrap { max-width:620px; margin:0 auto; padding:0 16px 50px; }
  .item { border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; }
  .item .top { display:flex; align-items:center; gap:10px; }
  .item .nm { font-weight:600; flex:1; }
  .badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:980px; white-space:nowrap; }
  .b-need { background:var(--amber-l); color:var(--amber); }
  .b-have { background:#e8f0fe; color:#1a56db; }
  .b-ok   { background:var(--green-l); color:var(--green); }
  .up { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .up input[type=file] { font-size:13px; }
  .note { background:var(--field); border-radius:14px; padding:12px 14px; font-size:13px; color:var(--ink-soft); margin:14px 0; }
</style>
</head>
<body>
<div class="topbar"><a class="brand" href="#"><img src="dw-logo.svg" alt="Day Webster Group" /></a></div>
<div class="wrap" style="padding-top:24px;">
  <h1 id="hello" style="font-size:28px;margin:6px 0 4px;">Your documents</h1>
  <p class="muted" id="sub">Loading…</p>
  <div class="note">Upload clear photos or scans (PDF, JPG or PNG, up to ~5MB each). Your documents are stored securely and checked by our compliance team — nothing is shared until then.</div>
  <div id="list"></div>
  <p class="muted" id="msg" style="text-align:center;margin-top:14px;"></p>
</div>

<script src="js/config.js"></script>
<script>
const FN = window.CONFIG.SUPABASE_URL + '/functions/v1/candidate-portal';
const token = new URLSearchParams(location.search).get('t') || '';
const $ = (id) => document.getElementById(id);
const esc = (s) => (s ?? '').toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

async function api(body) {
  const res = await fetch(FN, { method:'POST', headers:{ 'Content-Type':'application/json', 'apikey':window.CONFIG.SUPABASE_ANON_KEY, 'Authorization':'Bearer '+window.CONFIG.SUPABASE_ANON_KEY }, body: JSON.stringify({ token, ...body }) });
  return res.json();
}
function badge(status) {
  if (status === 'verified') return '<span class="badge b-ok">Verified</span>';
  if (status === 'received' || status === 'verifying') return '<span class="badge b-have">Received — being checked</span>';
  if (status === 'expired') return '<span class="badge b-need">Needs updating</span>';
  return '<span class="badge b-need">Needed</span>';
}
function canUpload(status){ return status !== 'verified' && status !== 'received' && status !== 'verifying'; }

let referees = [];
const refBadge = (s) => s==='confirmed' ? '<span class="badge b-ok">Confirmed</span>'
  : s==='received' ? '<span class="badge b-have">Reference received</span>'
  : s==='requested' ? '<span class="badge b-have">Request sent</span>'
  : '<span class="badge b-need">Queued</span>';

function refereeBlock() {
  const list = referees.map(r => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13.5px;"><span style="flex:1"><strong>${esc(r.name)}</strong>${r.organisation?(' · '+esc(r.organisation)):''}</span>${refBadge(r.status)}</div>`).join('');
  return `
    <div style="margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;">
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;">We need referees covering your last <strong>3 years</strong> of work. Add them below and <strong>we'll contact them for you</strong> — nothing else for you to do.</div>
      ${list}
      <div class="up" style="flex-direction:column;align-items:stretch;gap:6px;" id="refForm">
        <input placeholder="Referee name" class="rf-name" />
        <input placeholder="Referee email" type="email" class="rf-email" />
        <input placeholder="Organisation (e.g. the hospital or agency)" class="rf-org" />
        <div style="display:flex;gap:8px;align-items:center;"><button class="btn sm" id="addRefBtn">Add referee</button><span class="muted" id="refMsg"></span></div>
      </div>
    </div>`;
}

function render(items) {
  if (!items.length) { $('list').innerHTML = '<p class="muted">No documents are outstanding right now. 🎉</p>'; return; }
  $('list').innerHTML = items.map(it => `
    <div class="item" data-item="${it.id}" data-req="${it.requirement_id||''}">
      <div class="top"><span class="nm">${esc(it.name)}</span>${badge(it.status)}</div>
      ${canUpload(it.status) ? `<div class="up"><input type="file" accept=".pdf,.jpg,.jpeg,.png,.heic,.webp" /><button class="btn sm up-btn">Upload</button><span class="muted s"></span></div>` : ''}
      ${it.is_reference ? refereeBlock() : ''}
    </div>`).join('');
  $('list').querySelectorAll('.item').forEach(row => {
    const btn = row.querySelector('.up-btn'); if (btn) btn.onclick = () => uploadFor(row);
  });
  const addBtn = document.getElementById('addRefBtn');
  if (addBtn) addBtn.onclick = async () => {
    const f = document.getElementById('refForm');
    const name = f.querySelector('.rf-name').value.trim();
    const email = f.querySelector('.rf-email').value.trim();
    const organisation = f.querySelector('.rf-org').value.trim();
    const m = document.getElementById('refMsg');
    if (!name || !email) { m.textContent = 'Name and email needed.'; return; }
    addBtn.disabled = true; m.textContent = 'Adding…';
    const out = await api({ action:'add_referee', name, email, organisation });
    if (out.ok) { referees = out.referees || []; $('msg').textContent = 'Referee added — we\'ll contact them for you. ✓'; render(lastItems); }
    else { m.textContent = out.message || 'Could not add — try again.'; addBtn.disabled = false; }
  };
}
let lastItems = [];
async function prepareFile(file) {
  // Downscale large images in-browser so uploads are reliable.
  if (file.type && file.type.startsWith('image/')) {
    try {
      const img = await createImageBitmap(file);
      const max = 1800, scale = Math.min(1, max / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = cv.toDataURL('image/jpeg', 0.82);
      return { b64: dataUrl.split(',')[1], type: 'image/jpeg', name: file.name.replace(/\.[^.]+$/, '') + '.jpg' };
    } catch (_) { /* fall through to raw */ }
  }
  const b64 = await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result.toString().split(',')[1]); r.readAsDataURL(file); });
  return { b64, type: file.type || 'application/octet-stream', name: file.name };
}
async function uploadFor(row) {
  const file = row.querySelector('input[type=file]').files[0];
  const s = row.querySelector('.s'); const btn = row.querySelector('button');
  if (!file) { s.textContent = 'Choose a file first.'; return; }
  btn.disabled = true; s.textContent = 'Uploading…';
  try {
    const { b64, type, name } = await prepareFile(file);
    if (b64.length > 13000000) { s.textContent = 'That file’s too big — please upload a smaller scan, or email it to compliance@daywebster.com.'; btn.disabled = false; return; }
    const out = await api({ action: 'upload', item_id: row.dataset.item || null, requirement_id: row.dataset.req || null, filename: name, content_type: type, content_base64: b64 });
    if (out.ok) { $('msg').textContent = 'Thank you — that’s with our team. ✓'; lastItems = out.items || []; render(lastItems); }
    else { s.textContent = out.message || 'Upload failed — please try again.'; btn.disabled = false; }
  } catch (e) { s.textContent = 'Upload failed — please try again.'; btn.disabled = false; }
}

async function start() {
  if (!token) { $('sub').textContent = 'Please use the secure link we sent you by email.'; $('list').innerHTML = '<p class="muted">No personal link found. <a href="intake.html">Register here</a> and we’ll send you one.</p>'; return; }
  const out = await api({ action:'get' });
  if (out.error) { $('sub').textContent = 'That link doesn’t look right — please use the latest one we emailed you.'; return; }
  $('hello').textContent = `Hi ${out.candidate.first_name || 'there'} 👋`;
  $('sub').textContent = out.candidate.discipline ? `${out.candidate.discipline} — here’s what we need to get you work-ready.` : 'Here’s what we need to get you work-ready.';
  referees = out.referees || [];
  lastItems = out.items || [];
  render(lastItems);
}
start();
</script>
</body>
</html>
