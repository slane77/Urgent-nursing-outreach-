<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat to register — Day Webster</title>
<link rel="stylesheet" href="dw-theme.css" />
<style>
  .chatwrap { max-width:560px; margin:0 auto; padding:0 16px 40px; }
  .chat { background:#fff; border:1px solid rgba(0,0,0,.08); border-radius:24px; box-shadow:0 18px 50px rgba(0,0,0,.07); overflow:hidden; display:flex; flex-direction:column; height:calc(100vh - 150px); min-height:460px; }
  .stream { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
  .b { max-width:82%; padding:11px 14px; border-radius:18px; font-size:15px; line-height:1.45; white-space:pre-wrap; }
  .b.bot { background:var(--field); color:var(--ink); border-bottom-left-radius:5px; align-self:flex-start; }
  .b.me { background:var(--green); color:#fff; border-bottom-right-radius:5px; align-self:flex-end; }
  .typing { align-self:flex-start; color:var(--ink-soft); font-size:14px; padding:4px 6px; }
  .inputbar { display:flex; gap:8px; padding:14px; border-top:1px solid var(--hair); background:#fff; }
  .inputbar input { flex:1; }
  .inputbar button { flex:0 0 auto; }
  .hp { position:absolute; left:-9999px; }
  .notice { text-align:center; color:var(--ink-soft); padding:40px 16px; }
</style>
</head>
<body>
<div class="topbar"><a class="brand" href="dashboard.html"><img src="dw-logo.svg" alt="Day Webster Group" /></a>
  <nav class="topnav"><a href="intake.html">Use the form instead</a></nav>
</div>
<div class="chatwrap" style="padding-top:24px;">
  <h1 style="font-size:28px;text-align:center;margin:8px 0 16px;">Let's get you registered</h1>

  <div class="chat" id="chat">
    <div class="stream" id="stream"></div>
    <div class="inputbar" id="inputbar">
      <input id="msg" placeholder="Type your reply…" autocomplete="off" />
      <button class="btn" id="send">Send</button>
    </div>
  </div>
  <p class="muted" style="text-align:center;margin-top:12px;">Prefer a form? <a href="intake.html">Register here instead.</a></p>
  <input class="hp" id="website" tabindex="-1" autocomplete="off" />
</div>

<script src="js/config.js"></script>
<script>
const FN = window.CONFIG.SUPABASE_URL + '/functions/v1/chat-intake';
const $ = (id) => document.getElementById(id);
let transcript = [];   // [{role:'user'|'assistant', content:'...'}]
let candidateId = null;
let busy = false;

function bubble(text, who) {
  const d = document.createElement('div');
  d.className = 'b ' + (who === 'me' ? 'me' : 'bot');
  if (who === 'me') { d.textContent = text; }
  else {
    const esc = text.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    d.innerHTML = esc.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#0b7;font-weight:600">$1</a>');
  }
  $('stream').appendChild(d);
  $('stream').scrollTop = $('stream').scrollHeight;
}
function typing(on) {
  let t = document.getElementById('typing');
  if (on && !t) { t = document.createElement('div'); t.id = 'typing'; t.className = 'typing'; t.textContent = '…'; $('stream').appendChild(t); $('stream').scrollTop = $('stream').scrollHeight; }
  if (!on && t) t.remove();
}

async function ask(userText) {
  if (busy) return;
  busy = true; $('send').disabled = true;
  if (userText) { transcript.push({ role:'user', content:userText }); bubble(userText, 'me'); }
  typing(true);
  try {
    const res = await fetch(FN, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':window.CONFIG.SUPABASE_ANON_KEY, 'Authorization':'Bearer '+window.CONFIG.SUPABASE_ANON_KEY },
      body: JSON.stringify({ messages: transcript, candidate_id: candidateId, website: $('website').value }),
    });
    const out = await res.json();
    typing(false);
    const reply = out.reply || 'Thanks — a consultant will be in touch.';
    transcript.push({ role:'assistant', content: reply });
    if (out.candidate_id) candidateId = out.candidate_id;
    bubble(reply, 'bot');
  } catch (e) {
    typing(false);
    bubble('Sorry — something went wrong. Please use the registration form.', 'bot');
  }
  busy = false; $('send').disabled = false; $('msg').focus();
}

function start() {
  if (!window.CONFIG.CHAT_ENABLED) {
    $('chat').innerHTML = '<div class="notice">Our live chat is coming very soon. In the meantime, please <a href="intake.html">register using the form</a> — it only takes a minute.</div>';
    return;
  }
  $('send').onclick = () => { const v = $('msg').value.trim(); if (v) { $('msg').value=''; ask(v); } };
  $('msg').addEventListener('keydown', e => { if (e.key === 'Enter') $('send').click(); });
  ask(''); // get the agent's opener
}
start();
</script>
</body>
</html>
